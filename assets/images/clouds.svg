  <!-- Left portion: same cloud shifted left by 288 (the viewBox width) -->
  <g transform="translate(-40, 170)" opacity="0.9">
    <ellipse cx="30" cy="26" rx="32" ry="12" fill="#E8E8E8"/>
    <ellipse cx="12" cy="22" rx="18" ry="10" fill="#E8E8E8"/>
