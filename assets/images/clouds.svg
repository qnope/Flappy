    <ellipse cx="30" cy="7" rx="22" ry="12" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="0.5"/>
    <ellipse cx="30" cy="14" rx="28" ry="10" fill="#FFFFFF"/>
