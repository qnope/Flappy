<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 112">
  <!-- Dirt base layer -->
  <rect x="0" y="20" width="336" height="92" fill="#6D4C41"/>

  <!-- Dirt lighter middle band -->
