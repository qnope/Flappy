    M0,20
    C8,18 14,16 20,18
    C26,20 32,22 38,20
    C44,18 50,16 56,18
    C62,20 68,22 74,20
    C80,18 86,16 92,18
    C98,20 104,22 110,20
    C116,18 122,16 128,18
    C134,20 140,22 146,20
    C152,18 158,16 164,18
    C170,20 176,22 182,20
    C188,18 194,16 200,18
    C206,20 212,22 218,20
    C224,18 230,16 236,18
    C242,20 248,22 254,20
    C260,18 266,16 272,18
    C278,20 284,22 290,20
    C296,18 302,16 308,18
    C314,20 320,22 326,20
    C332,18 334,18 336,20
    L336,40
    L0,40
    Z
  " fill="#388E3C"/>

  <!-- Grass tufts on the surface -->
  <!-- Tuft 1 -->
  <path d="M14,16 L12,6 L16,14 L15,4 L18,13 L20,7 L19,16" fill="none" stroke="#388E3C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tuft 2 -->
  <path d="M52,14 L50,4 L54,12 L53,2 L56,11 L58,5 L57,14" fill="none" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tuft 3 -->
  <path d="M98,16 L96,7 L100,14 L99,5 L102,13 L104,8 L103,16" fill="none" stroke="#388E3C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tuft 4 -->
  <path d="M146,14 L144,5 L148,12 L147,3 L150,11 L152,6 L151,14" fill="none" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tuft 5 -->
  <path d="M194,16 L192,7 L196,14 L195,5 L198,13 L200,8 L199,16" fill="none" stroke="#388E3C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tuft 6 -->
  <path d="M242,14 L240,4 L244,12 L243,2 L246,11 L248,5 L247,14" fill="none" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tuft 7 -->
  <path d="M290,16 L288,7 L292,14 L291,5 L294,13 L296,8 L295,16" fill="none" stroke="#388E3C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tuft 8 -->
  <path d="M330,16 L328,8 L332,14 L331,6 L334,13" fill="none" stroke="#2E7D32" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Small grass dots/pebbles along the grass-dirt border -->
  <circle cx="10" cy="36" r="1.5" fill="#388E3C" opacity="0.5"/>
  <circle cx="42" cy="38" r="1" fill="#2E7D32" opacity="0.4"/>
  <circle cx="78" cy="36" r="1.5" fill="#388E3C" opacity="0.5"/>
  <circle cx="115" cy="37" r="1.2" fill="#2E7D32" opacity="0.4"/>
  <circle cx="155" cy="36" r="1.5" fill="#388E3C" opacity="0.5"/>
  <circle cx="190" cy="38" r="1" fill="#2E7D32" opacity="0.4"/>
  <circle cx="225" cy="36" r="1.5" fill="#388E3C" opacity="0.5"/>
  <circle cx="262" cy="37" r="1.2" fill="#2E7D32" opacity="0.4"/>
  <circle cx="300" cy="36" r="1.5" fill="#388E3C" opacity="0.5"/>
  <circle cx="333" cy="38" r="1" fill="#2E7D32" opacity="0.4"/>
