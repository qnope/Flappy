  <line x1="0" y1="70" x2="336" y2="70" stroke="#5D4037" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="90" x2="336" y2="90" stroke="#5D4037" stroke-width="0.8" opacity="0.25"/>

  <!-- Dirt texture dots -->
  <circle cx="20" cy="50" r="2" fill="#795548" opacity="0.3"/>
  <circle cx="70" cy="65" r="1.5" fill="#5D4037" opacity="0.3"/>
  <circle cx="130" cy="48" r="2" fill="#795548" opacity="0.25"/>
  <circle cx="180" cy="72" r="1.8" fill="#5D4037" opacity="0.3"/>
  <circle cx="240" cy="55" r="2" fill="#795548" opacity="0.25"/>
  <circle cx="290" cy="68" r="1.5" fill="#5D4037" opacity="0.3"/>
  <circle cx="50" cy="85" r="1.8" fill="#4E342E" opacity="0.2"/>
  <circle cx="110" cy="90" r="2" fill="#4E342E" opacity="0.2"/>
  <circle cx="200" cy="88" r="1.5" fill="#4E342E" opacity="0.2"/>
  <circle cx="310" cy="85" r="1.8" fill="#4E342E" opacity="0.2"/>
  <circle cx="160" cy="100" r="1.5" fill="#4E342E" opacity="0.15"/>
  <circle cx="260" cy="95" r="2" fill="#4E342E" opacity="0.15"/>

  <!-- Grass body (solid green below the wavy edge) -->
  <path d="M0,24 L336,24 L336,40 L0,40 Z" fill="#4CAF50"/>

  <!-- Wavy grass top surface - seamless tiling (starts and ends at y=16) -->
  <path d="
    M0,16
    C6,12 12,10 18,12
    C24,14 28,18 34,16
    C40,14 44,10 50,12
    C56,14 60,18 66,16
    C72,14 76,10 82,12
    C88,14 92,18 98,16
    C104,14 108,10 114,12
    C120,14 124,18 130,16
    C136,14 140,10 146,12
    C152,14 156,18 162,16
    C168,14 172,10 178,12
    C184,14 188,18 194,16
    C200,14 204,10 210,12
    C216,14 220,18 226,16
    C232,14 236,10 242,12
    C248,14 252,18 258,16
    C264,14 268,10 274,12
    C280,14 284,18 290,16
    C296,14 300,10 306,12
    C312,14 316,18 322,16
    C328,14 332,12 336,16
    L336,40
    L0,40
    Z
  " fill="#4CAF50"/>

  <!-- Darker grass overlay for depth -->
